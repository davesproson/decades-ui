        .text {
            font-family: 'Roboto', sans-serif;
            font-weight: 10;
            font-size: 40px;
            fill: rgb(90, 90, 90);
            stroke: rgb(90, 90, 90);
            stroke-width: 1.1;
        }

        .darker {
            fill: rgb(70, 70, 70);
            stroke: rgb(70, 70, 70);
        }

        .smaller {
            font-size: 30px;
        }

        .tick {
            stroke: rgb(90, 90, 90);
            stroke-width: 2;
        }

        .red {
            fill: rgb(255, 0, 0);
            stroke: rgb(255, 0, 0);
        }

        .black {
            fill: rgb(0, 0, 0);
            stroke: rgb(0, 0, 0);
        }

        .thicker {
            stroke-width: 3;
        }
    </style>
